<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>convergence — tiny planet duet</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #bfe3ff;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 14px;
        left: 14px;
        padding: 10px 14px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.72);
        color: #0b3a5b;
        font-weight: 600;
        font-size: 14px;
        box-shadow: 0 6px 20px rgba(0, 40, 80, 0.18);
        backdrop-filter: blur(6px);
      }
      #hud b {
        font-size: 18px;
      }
      #hud .bar {
        margin-top: 6px;
        height: 7px;
        width: 190px;
        background: rgba(11, 58, 91, 0.15);
        border-radius: 4px;
        overflow: hidden;
      }
      #hud .bar > i {
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, #6cc5ff, #ff5d8f);
      }
      #title {
        position: fixed;
        top: 14px;
        right: 14px;
        padding: 8px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.55);
        color: #0b3a5b;
        font-size: 12px;
      }
      #hint {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(11, 58, 91, 0.78);
        color: #eaf6ff;
        font-size: 13px;
        white-space: nowrap;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(7, 18, 38, 0.55);
        backdrop-filter: blur(3px);
        color: #eaf6ff;
        z-index: 10;
        cursor: pointer;
        transition: opacity 0.6s;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #overlay div {
        text-align: center;
        font-size: 18px;
        font-weight: 600;
        padding: 22px 30px;
        border-radius: 18px;
        background: rgba(11, 58, 91, 0.75);
        box-shadow: 0 10px 40px rgba(0, 20, 50, 0.4);
      }
      #overlay small {
        display: block;
        margin-top: 8px;
        font-weight: 400;
        color: #b8d8f0;
      }
      .popup {
        position: fixed;
        transform: translate(-50%, 0);
        font-weight: 800;
        font-size: 26px;
        color: #fff;
        pointer-events: none;
        text-shadow:
          0 2px 12px rgba(0, 60, 120, 0.55),
          0 0 26px rgba(255, 220, 120, 0.7);
        animation: floatUp 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        z-index: 5;
      }
      @keyframes floatUp {
        0% {
          opacity: 0;
          translate: 0 10px;
          scale: 0.5;
        }
        18% {
          opacity: 1;
          translate: 0 -6px;
          scale: 1.2;
        }
        100% {
          opacity: 0;
          translate: 0 -80px;
          scale: 1.05;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="world"></canvas>
    <div id="hud">
      ⭐ <b id="score">0</b>
      &nbsp;·&nbsp; phrases <b id="phraseN">0</b>
      &nbsp;·&nbsp; sections <b id="sectionN">0</b>
      &nbsp;·&nbsp; movements <b id="movementN">0</b>
      &nbsp; <span id="sound" title="M to mute">🔈</span>
      <div class="bar"><i id="tensionBar"></i></div>
    </div>
    <div id="title">convergence · tiny planet duet (Tone.js)</div>
    <div id="hint">A/D or ←/→ walk · Space jump · E or click to plant ♪ · catch ⭐ · M mute</div>
    <div id="overlay">
      <div>
        tap to visit the tiny planet
        <small>two melody voices walk the same Markov chain — planted probability pulls them into unison</small>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
